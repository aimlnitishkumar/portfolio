<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | CSE Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

<style>
    body { font-family: 'Poppins', sans-serif; cursor: none; } /* Custom cursor start */
    
    /* Custom Cursor Element */
    .cursor {
        width: 20px; height: 20px; border: 2px solid #0dcaf0;
        border-radius: 50%; position: fixed; pointer-events: none;
        z-index: 9999; transition: transform 0.1s ease;
    }

    /* Floating Animation for Hero */
    .floating {
        animation: floating 3s ease-in-out infinite;
    }
    @keyframes floating {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
    }

    /* Glassmorphism for Cards */
    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
</style>
    
    <style>
        :root { --primary-color: #0d6efd; --dark-bg: #121212; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; transition: 0.3s; }
        .navbar { backdrop-filter: blur(10px); background: rgba(33, 37, 41, 0.9) !important; }
        .hero-section { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white; padding: 100px 0; clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }
        .card { border: none; border-radius: 15px; transition: 0.4s; overflow: hidden; }
        .card:hover { transform: translateY(-10px); shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .skill-badge { padding: 10px 20px; border-radius: 50px; background: white; border: 1px solid #ddd; display: inline-block; margin: 5px; font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"></i>nitish !</a>
            </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
