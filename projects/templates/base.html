<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | nitish !</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #0dcaf0;
            --dark-bg: #0b0e11;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            transition: 0.3s;
            overflow-x: hidden;
        }

        /* Fixed Cursor Styling */

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(33, 37, 41, 0.9) !important;
        }

        .hero-section {
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
            padding: 100px 0;
        }

        /* Dark Mode Classes */
        body.dark-mode {
            background-color: var(--dark-bg);
            color: white;
        }

        .dark-mode .card {
            background: #1a1d21;
            color: white;
            border: 1px solid #333;
        }

        .dark-mode .text-muted {
            color: #aaa !important;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">nitish !</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'journey' %}">Journey</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'chat' %}">
                            <i class="fas fa-comments me-1"></i> Live Chat
                        </a>
                    </li>
                    <li class="nav-item">
                        <button id="theme-btn" class="btn btn-sm btn-outline-info ms-lg-3 mt-2 mt-lg-0">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Cursor Logic


        // Dark Mode Logic
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = themeBtn.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });
    </script>
</body>

</html>
